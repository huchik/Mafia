<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мафия Онлайн</title>
    <style>
        body {
            background-color: #4b6b94;
            font-family: Tahoma, Arial, sans-serif;
            color: #000;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .hidden { display: none !important; }
        
        .window {
            background: #ece9d8;
            border: 2px solid;
            border-color: #fff #000 #000 #fff;
            width: 520px;
            margin: 20px auto;
            text-align: left;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.5);
        }
        .window-title {
            background: linear-gradient(to bottom, #0a246a, #a6caf0);
            color: white;
            padding: 4px 8px;
            font-weight: bold;
            font-size: 12px;
        }
        .window-body {
            padding: 15px;
        }
        
        input, button, select {
            font-family: Tahoma, Arial, sans-serif;
            font-size: 12px;
            border: 1px solid #7f9db9;
            padding: 4px;
            background: #fff;
        }
        button {
            background: linear-gradient(to bottom, #f0f0f0, #e0e0e0);
            border: 1px solid #707070;
            cursor: pointer;
            padding: 4px 12px;
            margin: 2px;
        }

        #chat-box {
            background: #fff;
            border: 1px inset #7f9db9;
            height: 130px;
            overflow-y: scroll;
            padding: 5px;
            margin-bottom: 10px;
            font-size: 11px;
            text-align: left;
        }
        .chat-msg {
            margin-bottom: 4px;
            border-bottom: 1px dashed #eee;
            padding-bottom: 2px;
        }
        .status-box {
            background: #ffffcc;
            border: 1px solid #ffeb3b;
            padding: 6px;
            margin-bottom: 10px;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <!-- ОКНО ВХОДА -->
    <div class="window" id="login-screen">
        <div class="window-title">Лобби - Выбор комнаты</div>
        <div class="window-body">
            <p>Ваше имя игрока:</p>
            <input type="text" id="username" style="width: 100%; margin-bottom: 10px;" placeholder="Введите ник"><br>
            
            <hr style="border: 0; border-top: 1px solid #ccc; margin: 15px 0;">
            
            <b>Создать новую комнату:</b><br>
            <input type="text" id="new-room-code" style="width: 70%; margin-top: 5px;" placeholder="Название комнаты">
            <button id="create-room-btn">Создать</button>

            <b style="display: block; margin-top: 15px;">Активные комнаты:</b>
            <div id="rooms-list" style="background: #fff; border: 1px inset #7f9db9; height: 110px; overflow-y: auto; padding: 5px; margin-top: 5px;">
                <p style="font-size: 11px; color: #666;">Загрузка комнат...</p>
            </div>
        </div>
    </div>

    <!-- ИГРОВОЕ ОКНО -->
    <div class="window hidden" id="game-screen">
        <div class="window-title" id="room-title-bar">Мафия - Комната</div>
        <div class="window-body">
            <div class="status-box" id="role-display">Ваша роль: Ожидание...</div>

            <div style="margin-bottom: 10px;">
                <button id="start-btn" class="hidden">🎲 Начать игру</button>
                <button id="next-phase-btn" class="hidden" style="background: #d4edda; border-color: #c3e6cb;">☀️ Завершить ночь / Начать день</button>
            </div>
            
            <div style="display: flex; gap: 10px;">
                <div style="width: 45%;">
                    <b>Игроки:</b>
                    <ul id="players-list" style="background: #fff; border: 1px inset #7f9db9; height: 110px; overflow-y: auto; padding: 5px; margin-top: 5px; list-style: none; font-size: 11px;"></ul>
                </div>
                <div style="width: 50%;">
                    <b>Действие:</b>
                    <div style="background: #eee; border: 1px solid #ccc; padding: 5px; height: 110px; font-size: 11px; margin-top: 5px;">
                        <p id="action-instruction">Игра не началась.</p>
                        <select id="target-select" style="width: 100%; margin-bottom: 5px;" class="hidden"></select>
                        <button id="action-btn" class="hidden">Подтвердить ход</button>
                    </div>
                </div>
            </div>

            <b style="display: block; margin-top: 10px;">Чат:</b>
            <div id="chat-box"></div>
            <input type="text" id="chat-input" placeholder="Сообщение..." style="width: 78%;">
            <button id="send-chat-btn">Отправить</button>
        </div>
    </div>

    <!-- ВСЯ ЛОГИКА -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection, arrayUnion } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYqQwLQ2eQyvC_72529zCAMp5kD_Az91c",
            authDomain: "mafia-online-8d543.firebaseapp.com",
            projectId: "mafia-online-8d543",
            storageBucket: "mafia-online-8d543.firebasestorage.app",
            messagingSenderId: "1074431288177",
            appId: "1:1074431288177:web:531cc4eddcbbae02b08cd0",
            measurementId: "G-Q35R5WBKBV"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const loginScreen = document.getElementById("login-screen");
        const gameScreen = document.getElementById("game-screen");
        const usernameInput = document.getElementById("username");
        const newRoomCodeInput = document.getElementById("new-room-code");
        const createRoomBtn = document.getElementById("create-room-btn");
        const roomsListDiv = document.getElementById("rooms-list");

        const playersList = document.getElementById("players-list");
        const roomTitleBar = document.getElementById("room-title-bar");
        const roleDisplay = document.getElementById("role-display");
        const chatBox = document.getElementById("chat-box");
        const chatInput = document.getElementById("chat-input");
        const sendChatBtn = document.getElementById("send-chat-btn");
        const startBtn = document.getElementById("start-btn");
        const nextPhaseBtn = document.getElementById("next-phase-btn");
        const actionInstruction = document.getElementById("action-instruction");
        const targetSelect = document.getElementById("target-select");
        const actionBtn = document.getElementById("action-btn");

        let playerName = "";
        let roomCode = "";
        let hasActed = false;

        function loadRoomsList() {
            const roomsRef = collection(db, "rooms");
            onSnapshot(roomsRef, (snapshot) => {
                roomsListDiv.innerHTML = "";
                if (snapshot.empty) {
                    roomsListDiv.innerHTML = "<p style='font-size: 11px; color: #666; padding: 5px;'>Нет комнат. Создайте свою!</p>";
                    return;
                }

                snapshot.forEach((docSnap) => {
                    const rCode = docSnap.id;
                    const rData = docSnap.data();
                    const playersCount = rData.players ? rData.players.length : 0;
                    const statusText = rData.status === "waiting" ? "Ожидание" : (rData.status === "night" ? "🌙 Ночь" : "☀️ День");

                    const div = document.createElement("div");
                    div.style.cssText = "display: flex; justify-content: space-between; align-items: center; background: #fff; border: 1px solid #7f9db9; padding: 4px; margin-bottom: 3px; font-size: 11px;";
                    div.innerHTML = `
                        <span><b>${rCode}</b> (${statusText}, игроков: ${playersCount})</span>
                        <button data-code="${rCode}" class="join-room-btn">Войти</button>
                    `;
                    roomsListDiv.appendChild(div);
                });

                document.querySelectorAll(".join-room-btn").forEach(btn => {
                    btn.addEventListener("click", async (e) => {
                        const targetCode = e.target.getAttribute("data-code");
                        await joinRoom(targetCode);
                    });
                });
            });
        }

        createRoomBtn.addEventListener("click", async () => {
            playerName = usernameInput.value.trim();
            roomCode = newRoomCodeInput.value.trim();

            if (!playerName) { alert("Введите имя!"); return; }
            if (!roomCode) { alert("Введите название комнаты!"); return; }

            try {
                const roomRef = doc(db, "rooms", roomCode);
                const roomSnap = await getDoc(roomRef);

                if (roomSnap.exists()) { alert("Комната уже существует!"); return; }

                await setDoc(roomRef, {
                    host: playerName,
                    status: "waiting",
                    players: [{ name: playerName, role: "Ожидание", alive: true }],
                    nightActions: {},
                    messages: []
                });

                enterGameScreen();
            } catch (err) {
                console.error(err);
                alert("Ошибка создания комнаты.");
            }
        });

        async function joinRoom(code) {
            playerName = usernameInput.value.trim();
            if (!playerName) { alert("Сначала введите ваше имя вверху!"); return; }

            roomCode = code;
            try {
                const roomRef = doc(db, "rooms", roomCode);
                const roomSnap = await getDoc(roomRef);

                if (!roomSnap.exists()) { alert("Комната не найдена!"); return; }

                const data = roomSnap.data();
                if (data.status !== "waiting") { alert("Игра уже началась!"); return; }

                const exists = data.players.find(p => p.name === playerName);
                if (!exists) {
                    await updateDoc(roomRef, {
                        players: arrayUnion({ name: playerName, role: "Ожидание", alive: true })
                    });
                }

                enterGameScreen();
            } catch (err) {
                console.error(err);
                alert("Ошибка входа.");
            }
        }

        function enterGameScreen() {
            loginScreen.classList.add("hidden");
            gameScreen.classList.remove("hidden");
            roomTitleBar.innerText = `Мафия - Комната: ${roomCode}`;
            subscribeToRoom();
        }

        // Старт игры хостом
        startBtn.addEventListener("click", async () => {
            const roomRef = doc(db, "rooms", roomCode);
            const roomSnap = await getDoc(roomRef);
            if (!roomSnap.exists()) return;
            
            let players = roomSnap.data().players;
            if (players.length < 3) { alert("Нужно минимум 3 игрока для ролей (Мафия, Шериф, Путана/Мирный)!"); return; }

            const rolesPool = ["Мафия", "Шериф", "Путана"];
            while (rolesPool.length < players.length) rolesPool.push("Мирный");
            rolesPool.sort(() => Math.random() - 0.5);

            players.forEach((p, i) => { p.role = rolesPool[i]; p.alive = true; });

            hasActed = false;
            await updateDoc(roomRef, {
                status: "night",
                players: players,
                nightActions: {},
                messages: arrayUnion({ sender: "Система", time: new Date().toLocaleTimeString().slice(0, 5), text: "🎲 Игра началась! Наступила ночь. Роли распределены." })
            });
        });

        // Отправка ночного хода
        actionBtn.addEventListener("click", async () => {
            const target = targetSelect.value;
            if (!target) return;

            const roomRef = doc(db, "rooms", roomCode);
            const roomSnap = await getDoc(roomRef);
            const data = roomSnap.data();
            const me = data.players.find(p => p.name === playerName);

            let actions = data.nightActions || {};
            actions[playerName] = { role: me.role, target: target };

            hasActed = true;
            actionBtn.classList.add("hidden");
            targetSelect.classList.add("hidden");
            actionInstruction.innerText = "Ход принят. Ожидание остальных игроков...";

            await updateDoc(roomRef, { nightActions: actions });
        });

        // Кнопка хоста для перехода от ночи к дню с обработкой убийств
        nextPhaseBtn.addEventListener("click", async () => {
            const roomRef = doc(db, "rooms", roomCode);
            const roomSnap = await getDoc(roomRef);
            if (!roomSnap.exists()) return;
            const data = roomSnap.data();

            let players = data.players;
            let actions = data.nightActions || {};
            let mafiaTarget = null;
            let blockedTarget = null;
            let sheriffCheck = null;

            // Обрабатываем ночные действия
            for (let pName in actions) {
                let act = actions[pName];
                if (act.role === "Мафия") mafiaTarget = act.target;
                if (act.role === "Путана") blockedTarget = act.target;
                if (act.role === "Шериф") sheriffCheck = act;
            }

            let nightLog = "☀️ Наступил день. Итоги ночи:<br>";

            // Если путана заблокировала мафию — убийства нет
            if (mafiaTarget && mafiaTarget === blockedTarget) {
                nightLog += "• Ночью было тихо: мафия пришла к жертве, но ее отвлекла путана!<br>";
                mafiaTarget = null;
            }

            // Убийство мафии
            if (mafiaTarget) {
                let victim = players.find(p => p.name === mafiaTarget);
                if (victim) {
                    victim.alive = false;
                    nightLog += `• Город проснулся с ужасной новостью: убит **${victim.name}**!<br>`;
                }
            } else {
                nightLog += "• Ночь прошла спокойно, никто не погиб.<br>";
            }

            await updateDoc(roomRef, {
                status: "day",
                players: players,
                nightActions: {},
                messages: arrayUnion({ sender: "Система", time: new Date().toLocaleTimeString().slice(0, 5), text: nightLog })
            });
            hasActed = false;
        });

        // Чат
        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            const roomRef = doc(db, "rooms", roomCode);
            await updateDoc(roomRef, {
                messages: arrayUnion({ sender: playerName, text: text, time: new Date().toLocaleTimeString().slice(0, 5) })
            });
            chatInput.value = "";
        }

        sendChatBtn.addEventListener("click", sendMessage);
        chatInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

        // Синхронизация комнаты в реальном времени
        function subscribeToRoom() {
            const roomRef = doc(db, "rooms", roomCode);
            onSnapshot(roomRef, (docSnap) => {
                if (!docSnap.exists()) return;
                const data = docSnap.data();

                // Управление кнопкой старта для хоста
                if (data.host === playerName && data.status === "waiting") {
                    startBtn.classList.remove("hidden");
                } else {
                    startBtn.classList.add("hidden");
                }

                // Кнопка перехода фазы (доступна хосту во время ночи)
                if (data.host === playerName && data.status === "night") {
                    nextPhaseBtn.classList.remove("hidden");
                } else {
                    nextPhaseBtn.classList.add("hidden");
                }

                // Список игроков
                playersList.innerHTML = "";
                data.players.forEach(p => {
                    const li = document.createElement("li");
                    li.innerHTML = `${p.name} — <span style="color: ${p.alive ? 'green' : 'red'}">${p.alive ? 'Жив' : 'Мертв'}</span>`;
                    playersList.appendChild(li);
                });

                const me = data.players.find(p => p.name === playerName);
                if (me) {
                    if (data.status === "waiting") {
                        roleDisplay.innerText = "Ваша роль: Ожидание начала...";
                        actionInstruction.innerText = "Игра еще не началась.";
                        targetSelect.classList.add("hidden");
                        actionBtn.classList.add("hidden");
                    } else if (!me.alive) {
                        roleDisplay.innerText = `Ваша роль: ${me.role} (Мертв 💀)`;
                        actionInstruction.innerText = "Вы погибли и можете только наблюдать.";
                        targetSelect.classList.add("hidden");
                        actionBtn.classList.add("hidden");
                    } else {
                        roleDisplay.innerText = `Ваша роль: ${me.role} (Жив)`;

                        if (data.status === "night") {
                            if (me.role === "Мирный") {
                                actionInstruction.innerText = "Ночь. Вы мирный житель, спите...";
                                targetSelect.classList.add("hidden");
                                actionBtn.classList.add("hidden");
                            } else {
                                if (!hasActed) {
                                    actionInstruction.innerText = getInstruction(me.role);
                                    targetSelect.innerHTML = "";
                                    data.players.forEach(p => {
                                        if (p.name !== playerName && p.alive) {
                                            const opt = document.createElement("option");
                                            opt.value = p.name;
                                            opt.innerText = p.name;
                                            targetSelect.appendChild(opt);
                                        }
                                    });
                                    targetSelect.classList.remove("hidden");
                                    actionBtn.classList.remove("hidden");
                                } else {
                                    actionInstruction.innerText = "Ваш выбор принят. Ждите утро.";
                                    targetSelect.classList.add("hidden");
                                    actionBtn.classList.add("hidden");
                                }
                            }
                        } else if (data.status === "day") {
                            hasActed = false;
                            actionInstruction.innerText = "Наступил день. Обсуждайте события в чате!";
                            targetSelect.classList.add("hidden");
                            actionBtn.classList.add("hidden");
                        }
                    }
                }

                // Вывод сообщений чата
                if (data.messages) {
                    chatBox.innerHTML = "";
                    data.messages.forEach(msg => {
                        const div = document.createElement("div");
                        div.className = "chat-msg";
                        div.innerHTML = `<b>[${msg.time}] ${msg.sender}:</b> ${msg.text}`;
                        chatBox.appendChild(div);
                    });
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            });
        }

        function getInstruction(role) {
            if (role === "Мафия") return "Выберите жертву для убийства:";
            if (role === "Шериф") return "Выберите игрока для проверки:";
            if (role === "Путана") return "Выберите игрока для блокировки:";
            return "";
        }

        loadRoomsList();
    </script>
</body>
</html>
