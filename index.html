<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мафия Онлайн</title>
    <style>
        body {
            background-color: #4b6b94;
            font-family: Tahoma, Arial, sans-serif;
            color: #000;
            margin: 0;
            padding: 10px;
            text-align: center;
        }
        .hidden { display: none !important; }
        
        .window {
            background: #ece9d8;
            border: 2px solid;
            border-color: #fff #000 #000 #fff;
            width: 100%;
            max-width: 520px;
            margin: 10px auto;
            text-align: left;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        .window-title {
            background: linear-gradient(to bottom, #0a246a, #a6caf0);
            color: white;
            padding: 6px 8px;
            font-weight: bold;
            font-size: 12px;
        }
        .window-body {
            padding: 10px;
        }
        
        input, button, select {
            font-family: Tahoma, Arial, sans-serif;
            font-size: 14px; /* Увеличено для удобства нажатия на мобильных */
            border: 1px solid #7f9db9;
            padding: 6px;
            background: #fff;
            box-sizing: border-box;
        }
        button {
            background: linear-gradient(to bottom, #f0f0f0, #e0e0e0);
            border: 1px solid #707070;
            cursor: pointer;
            padding: 6px 12px;
            margin: 2px;
        }

        /* Адаптивный контейнер для блоков игроков и действий */
        .game-grid {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .game-col-1, .game-col-2 {
            width: 100%;
        }

        @media (min-width: 480px) {
            .game-col-1 { width: 45%; }
            .game-col-2 { width: 52%; }
            body { padding: 20px; }
            .window-body { padding: 15px; }
        }

        #chat-box {
            background: #fff;
            border: 1px inset #7f9db9;
            height: 120px;
            overflow-y: scroll;
            padding: 5px;
            margin-bottom: 10px;
            font-size: 11px;
            text-align: left;
        }
        .chat-msg {
            margin-bottom: 4px;
            border-bottom: 1px dashed #eee;
            padding-bottom: 2px;
        }
        .status-box {
            background: #ffffcc;
            border: 1px solid #ffeb3b;
            padding: 6px;
            margin-bottom: 10px;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <!-- ОКНО ВХОДА -->
    <div class="window" id="login-screen">
        <div class="window-title">Лобби - Выбор комнаты</div>
        <div class="window-body">
            <p style="margin-top: 0;">Ваше имя игрока:</p>
            <input type="text" id="username" style="width: 100%; margin-bottom: 10px;" placeholder="Введите ник"><br>
            
            <hr style="border: 0; border-top: 1px solid #ccc; margin: 15px 0;">
            
            <b>Создать новую комнату:</b><br>
            <div style="display: flex; gap: 5px; margin-top: 5px;">
                <input type="text" id="new-room-code" style="flex: 1;" placeholder="Название комнаты">
                <button id="create-room-btn">Создать</button>
            </div>

            <b style="display: block; margin-top: 15px;">Активные комнаты:</b>
            <div id="rooms-list" style="background: #fff; border: 1px inset #7f9db9; height: 130px; overflow-y: auto; padding: 5px; margin-top: 5px;">
                <p style="font-size: 11px; color: #666;">Загрузка комнат...</p>
            </div>
        </div>
    </div>

    <!-- ИГРОВОЕ ОКНО -->
    <div class="window hidden" id="game-screen">
        <div class="window-title" id="room-title-bar">Мафия - Комната</div>
        <div class="window-body">
            <div class="status-box" id="role-display">Ваша роль: Ожидание...</div>

            <div style="margin-bottom: 10px;">
                <button id="start-btn" class="hidden" style="width: 100%;">🎲 Начать игру</button>
                <button id="next-phase-btn" class="hidden" style="width: 100%; background: #d4edda; border-color: #c3e6cb;">🌙 Завершить день / Наступит ночь</button>
            </div>
            
            <div class="game-grid">
                <div class="game-col-1">
                    <b>Игроки:</b>
                    <ul id="players-list" style="background: #fff; border: 1px inset #7f9db9; height: 110px; overflow-y: auto; padding: 5px; margin-top: 5px; list-style: none; font-size: 11px; margin-bottom: 10px;"></ul>
                </div>
                <div class="game-col-2">
                    <b id="action-title">Действие:</b>
                    <div style="background: #eee; border: 1px solid #ccc; padding: 5px; min-height: 110px; font-size: 11px; margin-top: 5px; box-sizing: border-box;">
                        <p id="action-instruction" style="margin-top: 0;">Игра не началась.</p>
                        <select id="target-select" style="width: 100%; margin-bottom: 5px;" class="hidden"></select>
                        <div style="display: flex; gap: 5px;">
                            <button id="action-btn" class="hidden" style="flex: 1;">Подтвердить</button>
                            <button id="skip-btn" class="hidden" style="background: #f8d7da; border-color: #f5c6cb; flex: 1;">Пропустить</button>
                        </div>
                    </div>
                </div>
            </div>

            <b style="display: block; margin-top: 10px;">Чат:</b>
            <div id="chat-box"></div>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="chat-input" placeholder="Сообщение..." style="flex: 1;">
                <button id="send-chat-btn">Отправить</button>
            </div>
        </div>
    </div>

    <!-- ВСЯ ЛОГИКА -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection, arrayUnion } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYqQwLQ2eQyvC_72529zCAMp5kD_Az91c",
            authDomain: "mafia-online-8d543.firebaseapp.com",
            projectId: "mafia-online-8d543",
            storageBucket: "mafia-online-8d543.firebasestorage.app",
            messagingSenderId: "1074431288177",
            appId: "1:1074431288177:web:531cc4eddcbbae02b08cd0",
            measurementId: "G-Q35R5WBKBV"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const loginScreen = document.getElementById("login-screen");
        const gameScreen = document.getElementById("game-screen");
        const usernameInput = document.getElementById("username");
        const newRoomCodeInput = document.getElementById("new-room-code");
        const createRoomBtn = document.getElementById("create-room-btn");
        const roomsListDiv = document.getElementById("rooms-list");

        const playersList = document.getElementById("players-list");
        const roomTitleBar = document.getElementById("room-title-bar");
        const roleDisplay = document.getElementById("role-display");
        const chatBox = document.getElementById("chat-box");
        const chatInput = document.getElementById("chat-input");
        const sendChatBtn = document.getElementById("send-chat-btn");
        const startBtn = document.getElementById("start-btn");
        const nextPhaseBtn = document.getElementById("next-phase-btn");
        const actionTitle = document.getElementById("action-title");
        const actionInstruction = document.getElementById("action-instruction");
        const targetSelect = document.getElementById("target-select");
        const actionBtn = document.getElementById("action-btn");
        const skipBtn = document.getElementById("skip-btn");

        let playerName = "";
        let roomCode = "";
        let hasActed = false;

        function loadRoomsList() {
            const roomsRef = collection(db, "rooms");
            onSnapshot(roomsRef, (snapshot) => {
                roomsListDiv.innerHTML = "";
                if (snapshot.empty) {
                    roomsListDiv.innerHTML = "<p style='font-size: 11px; color: #666; padding: 5px;'>Нет комнат. Создайте свою!</p>";
                    return;
                }

                snapshot.forEach((docSnap) => {
                    const rCode = docSnap.id;
                    const rData = docSnap.data();
                    const playersCount = rData.players ? rData.players.length : 0;
                    let statusText = "Ожидание";
                    if (rData.status === "night") statusText = "🌙 Ночь";
                    if (rData.status === "day") statusText = "☀️ День";
                    if (rData.status === "ended") statusText = "🏁 Игра окончена";

                    const div = document.createElement("div");
                    div.style.cssText = "display: flex; justify-content: space-between; align-items: center; background: #fff; border: 1px solid #7f9db9; padding: 6px; margin-bottom: 4px; font-size: 11px;";
                    div.innerHTML = `
                        <span><b>${rCode}</b> (${statusText}, игроков: ${playersCount})</span>
                        <button data-code="${rCode}" class="join-room-btn">Войти</button>
                    `;
                    roomsListDiv.appendChild(div);
                });

                document.querySelectorAll(".join-room-btn").forEach(btn => {
                    btn.addEventListener("click", async (e) => {
                        const targetCode = e.target.getAttribute("data-code");
                        await joinRoom(targetCode);
                    });
                });
            });
        }

        createRoomBtn.addEventListener("click", async () => {
            playerName = usernameInput.value.trim();
            roomCode = newRoomCodeInput.value.trim();

            if (!playerName) { alert("Введите имя!"); return; }
            if (!roomCode) { alert("Введите название комнаты!"); return; }

            try {
                const roomRef = doc(db, "rooms", roomCode);
                const roomSnap = await getDoc(roomRef);

                if (roomSnap.exists()) { alert("Комната уже существует!"); return; }

                await setDoc(roomRef, {
                    host: playerName,
                    status: "waiting",
                    players: [{ name: playerName, role: "Ожидание", alive: true }],
                    nightActions: {},
                    dayVotes: {},
                    messages: []
                });

                enterGameScreen();
            } catch (err) {
                console.error(err);
                alert("Ошибка создания комнаты.");
            }
        });

        async function joinRoom(code) {
            playerName = usernameInput.value.trim();
            if (!playerName) { alert("Сначала введите ваше имя вверху!"); return; }

            roomCode = code;
            try {
                const roomRef = doc(db, "rooms", roomCode);
                const roomSnap = await getDoc(roomRef);

                if (!roomSnap.exists()) { alert("Комната не найдена!"); return; }

                const data = roomSnap.data();
                if (data.status !== "waiting") { alert("Игра уже началась!"); return; }

                const exists = data.players.find(p => p.name === playerName);
                if (!exists) {
                    await updateDoc(roomRef, {
                        players: arrayUnion({ name: playerName, role: "Ожидание", alive: true })
                    });
                }

                enterGameScreen();
            } catch (err) {
                console.error(err);
                alert("Ошибка входа.");
            }
        }

        function enterGameScreen() {
            loginScreen.classList.add("hidden");
            gameScreen.classList.remove("hidden");
            roomTitleBar.innerText = `Мафия - Комната: ${roomCode}`;
            subscribeToRoom();
        }

        startBtn.addEventListener("click", async () => {
            const roomRef = doc(db, "rooms", roomCode);
            const roomSnap = await getDoc(roomRef);
            if (!roomSnap.exists()) return;
            
            let players = roomSnap.data().players;
            if (players.length < 4) { alert("Нужно минимум 4 игрока (Мафия, Шериф, Доктор, Путана)!"); return; }

            const rolesPool = ["Мафия", "Шериф", "Доктор", "Путана"];
            while (rolesPool.length < players.length) rolesPool.push("Мирный");
            rolesPool.sort(() => Math.random() - 0.5);

            players.forEach((p, i) => { p.role = rolesPool[i]; p.alive = true; });

            hasActed = false;
            await updateDoc(roomRef, {
                status: "night",
                players: players,
                nightActions: {},
                dayVotes: {},
                messages: arrayUnion({ sender: "Система", time: new Date().toLocaleTimeString().slice(0, 5), text: "🎲 Игра началась! Наступила ночь." })
            });
        });

        actionBtn.addEventListener("click", async () => {
            const target = targetSelect.value;
            if (!target) return;
            await sendAction(target);
        });

        skipBtn.addEventListener("click", async () => {
            await sendAction("СКИП");
        });

        async function sendAction(targetValue) {
            const roomRef = doc(db, "rooms", roomCode);
            const roomSnap = await getDoc(roomRef);
            const data = roomSnap.data();

            hasActed = true;
            actionBtn.classList.add("hidden");
            skipBtn.classList.add("hidden");
            targetSelect.classList.add("hidden");
            actionInstruction.innerText = "Голос/ход принят. Ожидание остальных...";

            if (data.status === "night") {
                let actions = data.nightActions || {};
                const me = data.players.find(p => p.name === playerName);
                actions[playerName] = { role: me.role, target: targetValue };
                await updateDoc(roomRef, { nightActions: actions });
            } else if (data.status === "day") {
                let votes = data.dayVotes || {};
                votes[playerName] = targetValue;
                await updateDoc(roomRef, { dayVotes: votes });
            }
        }

        nextPhaseBtn.addEventListener("click", async () => {
            const roomRef = doc(db, "rooms", roomCode);
            const roomSnap = await getDoc(roomRef);
            if (!roomSnap.exists()) return;
            const data = roomSnap.data();

            if (data.status === "night") return;

            if (data.status === "day") {
                let players = data.players;
                let votes = data.dayVotes || {};
                let counts = {};

                for (let p in votes) {
                    let target = votes[p];
                    if (target !== "СКИП") {
                        counts[target] = (counts[target] || 0) + 1;
                    }
                }

                let maxVotes = 0;
                let lynched = null;
                for (let target in counts) {
                    if (counts[target] > maxVotes) {
                        maxVotes = counts[target];
                        lynched = target;
                    }
                }

                let dayLog = "☀️ Итоги дневного голосования:<br>";
                if (lynched) {
                    let victim = players.find(p => p.name === lynched);
                    if (victim) {
                        victim.alive = false;
                        dayLog += `• Город решил изгнать игрока <b>${victim.name}</b>. Это был **${victim.role}**!<br>`;

                        if (victim.role === "Мафия") {
                            dayLog += "<br>🏆 <b>ГОРОД ПОБЕДИЛ!</b> Мафия была изгнана из города.";
                            await updateDoc(roomRef, {
                                status: "ended",
                                players: players,
                                dayVotes: {},
                                messages: arrayUnion({ sender: "Система", time: new Date().toLocaleTimeString().slice(0, 5), text: dayLog })
                            });
                            return;
                        }
                    }
                } else {
                    dayLog += "• Город никого не изгнал (все пропустили голос или голоса разделились).<br>";
                }

                dayLog += "<br>🌙 Наступает ночь...";
                await updateDoc(roomRef, {
                    status: "night",
                    players: players,
                    dayVotes: {},
                    nightActions: {},
                    messages: arrayUnion({ sender: "Система", time: new Date().toLocaleTimeString().slice(0, 5), text: dayLog })
                });
                hasActed = false;
            }
        });

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            const roomRef = doc(db, "rooms", roomCode);
            await updateDoc(roomRef, {
                messages: arrayUnion({ sender: playerName, text: text, time: new Date().toLocaleTimeString().slice(0, 5) })
            });
            chatInput.value = "";
        }

        sendChatBtn.addEventListener("click", sendMessage);
        chatInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

        function subscribeToRoom() {
            const roomRef = doc(db, "rooms", roomCode);
            onSnapshot(roomRef, (docSnap) => {
                if (!docSnap.exists()) return;
                const data = docSnap.data();

                if (data.host === playerName && data.status === "waiting") {
                    startBtn.classList.remove("hidden");
                } else {
                    startBtn.classList.add("hidden");
                }

                if (data.host === playerName && data.status === "night") {
                    nextPhaseBtn.innerText = "☀️ Завершить ночь / Наступит день";
                    nextPhaseBtn.classList.remove("hidden");
                } else if (data.host === playerName && data.status === "day") {
                    nextPhaseBtn.innerText = "🌙 Подвести итоги дня / Наступит ночь";
                    nextPhaseBtn.classList.remove("hidden");
                } else {
                    nextPhaseBtn.classList.add("hidden");
                }

                playersList.innerHTML = "";
                data.players.forEach(p => {
                    const li = document.createElement("li");
                    li.innerHTML = `${p.name} — <span style="color: ${p.alive ? 'green' : 'red'}">${p.alive ? 'Жив' : 'Мертв'}</span>`;
                    playersList.appendChild(li);
                });

                const me = data.players.find(p => p.name === playerName);
                if (me) {
                    if (data.status === "waiting") {
                        roleDisplay.innerText = "Ваша роль: Ожидание начала...";
                        actionTitle.innerText = "Действие:";
                        actionInstruction.innerText = "Игра еще не началась.";
                        targetSelect.classList.add("hidden");
                        actionBtn.classList.add("hidden");
                        skipBtn.classList.add("hidden");
                    } else if (data.status === "ended") {
                        roleDisplay.innerText = `Ваша роль была: ${me.role}`;
                        actionTitle.innerText = "Конец игры";
                        actionInstruction.innerText = "Игра завершена.";
                        targetSelect.classList.add("hidden");
                        actionBtn.classList.add("hidden");
                        skipBtn.classList.add("hidden");
                    } else if (!me.alive) {
                        roleDisplay.innerText = `Ваша роль: ${me.role} (Мертв 💀)`;
                        actionTitle.innerText = "Наблюдение";
                        actionInstruction.innerText = "Вы погибли и можете только общаться в чате.";
                        targetSelect.classList.add("hidden");
                        actionBtn.classList.add("hidden");
                        skipBtn.classList.add("hidden");
                    } else {
                        roleDisplay.innerText = `Ваша роль: ${me.role} (Жив)`;

                        if (data.status === "night") {
                            actionTitle.innerText = "Действие (Ночь):";
                            if (me.role === "Мирный") {
                                actionInstruction.innerText = "🌙 Вы мирный житель, спите...";
                                targetSelect.classList.add("hidden");
                                actionBtn.classList.add("hidden");
                                skipBtn.classList.add("hidden");
                            } else {
                                if (!hasActed) {
                                    actionInstruction.innerText = getInstruction(me.role);
                                    targetSelect.innerHTML = "";
                                    data.players.forEach(p => {
                                        if (p.name !== playerName && p.alive) {
                                            const opt = document.createElement("option");
                                            opt.value = p.name;
                                            opt.innerText = p.name;
                                            targetSelect.appendChild(opt);
                                        }
                                    });
                                    targetSelect.classList.remove("hidden");
                                    actionBtn.classList.remove("hidden");
                                    skipBtn.classList.add("hidden");
                                } else {
                                    actionInstruction.innerText = "Ход принят. Ждем рассвета...";
                                    targetSelect.classList.add("hidden");
                                    actionBtn.classList.add("hidden");
                                    skipBtn.classList.add("hidden");
                                }
                            }
                        } else if (data.status === "day") {
                            actionTitle.innerText = "Голосование (День):";
                            if (!hasActed) {
                                actionInstruction.innerText = "☀️ Выберите, кого изгнать городом, или пропустите:";
                                targetSelect.innerHTML = "";
                                data.players.forEach(p => {
                                    if (p.alive) {
                                        const opt = document.createElement("option");
                                        opt.value = p.name;
                                        opt.innerText = p.name;
                                        targetSelect.appendChild(opt);
                                    }
                                });
                                targetSelect.classList.remove("hidden");
                                actionBtn.classList.remove("hidden");
                                skipBtn.classList.remove("hidden");
                            } else {
                                actionInstruction.innerText = "Ваш голос учтен. Ожидание остальных...";
                                targetSelect.classList.add("hidden");
                                actionBtn.classList.add("hidden");
                                skipBtn.classList.add("hidden");
                            }
                        }
                    }
                }

                if (data.messages) {
                    chatBox.innerHTML = "";
                    data.messages.forEach(msg => {
                        const div = document.createElement("div");
                        div.className = "chat-msg";
                        div.innerHTML = `<b>[${msg.time}] ${msg.sender}:</b> ${msg.text}`;
                        chatBox.appendChild(div);
                    });
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            });
        }

        // Автоматическая обработка ночных ходов хостом при нажатии на кнопку перехода в день
        nextPhaseBtn.addEventListener("click", async () => {
            const roomRef = doc(db, "rooms", roomCode);
            const roomSnap = await getDoc(roomRef);
            if (!roomSnap.exists()) return;
            const data = roomSnap.data();

            if (data.status === "night") {
                let players = data.players;
                let actions = data.nightActions || {};
                
                let mafiaTarget = null;
                let doctorTarget = null;
                let blockedTarget = null;
                let sheriffTarget = null;
                let sheriffName = null;

                for (let pName in actions) {
                    let act = actions[pName];
                    if (act.role === "Мафия") mafiaTarget = act.target;
                    if (act.role === "Доктор") doctorTarget = act.target;
                    if (act.role === "Путана") blockedTarget = act.target;
                    if (act.role === "Шериф") {
                        sheriffTarget = act.target;
                        sheriffName = pName;
                    }
                }

                let nightLog = "☀️ Наступил день. Итоги ночи:<br>";

                if (blockedTarget && blockedTarget === mafiaTarget) {
                    nightLog += "• Путана отвлекла мафию, убийство сорвалось!<br>";
                    mafiaTarget = null;
                } else if (blockedTarget) {
                    nightLog += `• Путана провела ночь с игроком <b>${blockedTarget}</b>.<br>`;
                }

                let saved = false;
                if (mafiaTarget && mafiaTarget === doctorTarget) {
                    saved = true;
                    nightLog += `• Доктор вылечил раненого игрока <b>${mafiaTarget}</b>!<br>`;
                }

                if (mafiaTarget && !saved) {
                    let victim = players.find(p => p.name === mafiaTarget);
                    if (victim) {
                        victim.alive = false;
                        nightLog += `• Город проснулся с ужасной новостью: убит <b>${victim.name}</b> (${victim.role})!<br>`;
                    }
                } else if (!mafiaTarget) {
                    nightLog += "• Ночь прошла спокойно, никто не погиб.<br>";
                }

                if (sheriffTarget && sheriffName) {
                    let targetPlayer = players.find(p => p.name === sheriffTarget);
                    let isMafia = targetPlayer && targetPlayer.role === "Мафия";
                    nightLog += `• [Шериф ${sheriffName}] проверил ${sheriffTarget}: это ${isMafia ? '<b>МАФИЯ 🔴</b>' : '<b>мирный житель 🟢</b>'}.<br>`;
                }

                const aliveMafia = players.filter(p => p.alive && p.role === "Мафия").length;
                const aliveCivilians = players.filter(p => p.alive && p.role !== "Мафия").length;

                if (aliveMafia >= aliveCivilians) {
                    nightLog += "<br>🔴 <b>МАФИЯ ПОБЕДИЛА!</b> Они захватили город.";
                    await updateDoc(roomRef, {
                        status: "ended",
                        players: players,
                        nightActions: {},
                        messages: arrayUnion({ sender: "Система", time: new Date().toLocaleTimeString().slice(0, 5), text: nightLog })
                    });
                    return;
                }

                await updateDoc(roomRef, {
                    status: "day",
                    players: players,
                    nightActions: {},
                    dayVotes: {},
                    messages: arrayUnion({ sender: "Система", time: new Date().toLocaleTimeString().slice(0, 5), text: nightLog })
                });
                hasActed = false;
            }
        });

        function getInstruction(role) {
            if (role === "Мафия") return "🌙 Выберите жертву для устранения:";
            if (role === "Шериф") return "🌙 Выберите игрока для проверки:";
            if (role === "Доктор") return "🌙 Выберите игрока для лечения:";
            if (role === "Путана") return "🌙 Выберите игрока для блокировки:";
            return "";
        }

        loadRoomsList();
    </script>
